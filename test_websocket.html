<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini AnyDesk - Cliente WebSocket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #16213e;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        button.danger:hover {
            background: #ff4444;
            color: #fff;
        }

        button.success {
            border-color: #00ff88;
            color: #00ff88;
        }

        button.success:hover {
            background: #00ff88;
            color: #1a1a2e;
        }

        #status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        #status.connected {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        #status.disconnected {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .viewer {
            background: #0f0f23;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            max-width: 95vw;
            overflow: auto;
            position: relative;
        }

        #screenshot {
            max-width: 100%;
            display: none;
            border-radius: 4px;
            cursor: crosshair;
            /* Impede que o navegador arraste a imagem */
            user-select: none;
            -webkit-user-drag: none;
        }

        #placeholder {
            color: #555;
            text-align: center;
            padding: 100px 40px;
            font-size: 1.1rem;
        }

        .info-bar {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #666;
        }

        .info-bar span {
            background: #16213e;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .log {
            margin-top: 15px;
            width: 100%;
            max-width: 800px;
        }

        .log h3 {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        #messages {
            background: #0f0f23;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            color: #aaa;
        }

        .msg-entry {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .msg-entry.info { color: #00d4ff; }
        .msg-entry.success { color: #00ff88; }
        .msg-entry.error { color: #ff4444; }

        .keyboard-hint {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🖥️ Mini AnyDesk - Visualizador Remoto</h1>

    <div id="status" class="disconnected">● Desconectado</div>

    <div class="controls">
        <button id="btnConectar" class="success" onclick="conectar()">Conectar</button>
        <button id="btnDesconectar" class="danger" onclick="desconectar()" disabled>Desconectar</button>
        <button id="btnCapturar" onclick="capturarTela()" disabled>📸 Capturar Tela</button>
        <button id="btnStream" onclick="toggleStream()" disabled>▶️ Iniciar Stream</button>
        <button id="btnControle" onclick="toggleControle()" disabled>🖱️ Ativar Controle</button>
    </div>

    <div class="viewer" id="viewer">
        <p id="placeholder">Conecte ao serviço e clique em "Capturar Tela" para ver o screenshot.</p>
        <img id="screenshot" alt="Screenshot da tela remota">
    </div>

    <div class="info-bar">
        <span id="coordInfo">Mouse: --</span>
        <span id="fpsInfo">FPS: --</span>
        <span id="controleInfo">Controle: Desativado</span>
    </div>

    <p class="keyboard-hint">Com o controle ativo, clique na imagem e use o teclado para enviar teclas ao computador remoto.</p>

    <div class="log">
        <h3>Log de mensagens:</h3>
        <div id="messages"></div>
    </div>

    <script>
        let ws = null;
        let streaming = false;
        let controleAtivo = false;

        // Resolução real da tela remota (será atualizada quando recebermos a primeira imagem)
        let telaRealW = 1920;
        let telaRealH = 1080;

        // Contadores de FPS
        let frameCount = 0;
        let lastFpsTime = Date.now();

        function log(texto, tipo = '') {
            const div = document.getElementById('messages');
            const entry = document.createElement('div');
            entry.className = 'msg-entry ' + tipo;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${texto}`;
            div.appendChild(entry);
            div.scrollTop = div.scrollHeight;
            // Limita a 100 mensagens para não travar
            while (div.children.length > 100) div.removeChild(div.firstChild);
        }

        // Converte coordenadas do clique na imagem para coordenadas reais da tela remota
        function imgParaTela(imgElement, clickX, clickY) {
            const rect = imgElement.getBoundingClientRect();
            // Posição relativa dentro da imagem (0.0 a 1.0)
            const relX = clickX / rect.width;
            const relY = clickY / rect.height;
            // Converte para coordenadas absolutas da tela remota
            return {
                x: Math.round(relX * telaRealW),
                y: Math.round(relY * telaRealH)
            };
        }

        function conectar() {
            const porta = 4444;
            ws = new WebSocket(`ws://localhost:${porta}`);
            ws.binaryType = 'blob';

            ws.onopen = function () {
                document.getElementById('status').className = 'connected';
                document.getElementById('status').textContent = '● Conectado';
                document.getElementById('btnConectar').disabled = true;
                document.getElementById('btnDesconectar').disabled = false;
                document.getElementById('btnCapturar').disabled = false;
                document.getElementById('btnStream').disabled = false;
                document.getElementById('btnControle').disabled = false;
                log('Conexão WebSocket estabelecida!', 'success');
            };

            ws.onmessage = function (event) {
                if (event.data instanceof Blob) {
                    const url = URL.createObjectURL(event.data);
                    const img = document.getElementById('screenshot');
                    
                    if (img.src && img.src.startsWith('blob:')) {
                        URL.revokeObjectURL(img.src);
                    }

                    img.onload = function () {
                        // Atualiza a resolução real baseada na imagem recebida
                        telaRealW = img.naturalWidth;
                        telaRealH = img.naturalHeight;

                        // Calcula FPS
                        frameCount++;
                        const now = Date.now();
                        if (now - lastFpsTime >= 1000) {
                            document.getElementById('fpsInfo').textContent = `FPS: ${frameCount}`;
                            frameCount = 0;
                            lastFpsTime = now;
                        }
                    };

                    img.src = url;
                    img.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';

                    const sizeKB = (event.data.size / 1024).toFixed(0);
                    log(`Frame JPEG recebido: ${sizeKB} KB`, 'success');

                    if (streaming) {
                        ws.send('CAPTURAR_TELA');
                    }
                } else {
                    log('Servidor: ' + event.data, 'info');
                }
            };

            ws.onclose = function () {
                resetUI();
                log('Conexão fechada.', 'error');
            };

            ws.onerror = function () {
                log('Erro na conexão WebSocket.', 'error');
            };
        }

        function desconectar() {
            if (streaming) toggleStream();
            if (controleAtivo) toggleControle();
            if (ws) ws.close();
        }

        function capturarTela() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('CAPTURAR_TELA');
                log('Comando CAPTURAR_TELA enviado...', 'info');
            }
        }

        function toggleStream() {
            const btn = document.getElementById('btnStream');
            if (!streaming) {
                streaming = true;
                btn.textContent = '⏹️ Parar Stream';
                btn.classList.add('danger');
                log('Stream iniciado!', 'success');
                ws.send('CAPTURAR_TELA');
            } else {
                streaming = false;
                btn.textContent = '▶️ Iniciar Stream';
                btn.classList.remove('danger');
                log('Stream parado.', 'info');
            }
        }

        function toggleControle() {
            const btn = document.getElementById('btnControle');
            const info = document.getElementById('controleInfo');
            if (!controleAtivo) {
                controleAtivo = true;
                btn.textContent = '🖱️ Desativar Controle';
                btn.classList.add('danger');
                info.textContent = 'Controle: ATIVO';
                info.style.color = '#00ff88';
                log('Controle remoto ATIVADO. Clique na imagem para interagir.', 'success');
            } else {
                controleAtivo = false;
                btn.textContent = '🖱️ Ativar Controle';
                btn.classList.remove('danger');
                info.textContent = 'Controle: Desativado';
                info.style.color = '#666';
                log('Controle remoto desativado.', 'info');
            }
        }

        // ============================================================
        // Eventos de Mouse sobre a imagem
        // ============================================================
        const img = document.getElementById('screenshot');

        // Clique esquerdo
        img.addEventListener('click', function (e) {
            if (!controleAtivo || !ws) return;
            const rect = this.getBoundingClientRect();
            const coords = imgParaTela(this, e.clientX - rect.left, e.clientY - rect.top);
            ws.send(`MOUSE_CLICK ${coords.x} ${coords.y}`);
            log(`Click em (${coords.x}, ${coords.y})`, 'info');
        });

        // Clique direito
        img.addEventListener('contextmenu', function (e) {
            e.preventDefault(); // Impede o menu de contexto do navegador
            if (!controleAtivo || !ws) return;
            const rect = this.getBoundingClientRect();
            const coords = imgParaTela(this, e.clientX - rect.left, e.clientY - rect.top);
            ws.send(`MOUSE_RCLICK ${coords.x} ${coords.y}`);
            log(`Right-click em (${coords.x}, ${coords.y})`, 'info');
        });

        // Movimento do mouse (atualiza coordenadas no info bar)
        img.addEventListener('mousemove', function (e) {
            const rect = this.getBoundingClientRect();
            const coords = imgParaTela(this, e.clientX - rect.left, e.clientY - rect.top);
            document.getElementById('coordInfo').textContent = `Mouse: ${coords.x}, ${coords.y}`;

            // Se o controle estiver ativo, envia o movimento para o servidor
            // (Throttle: envia no máximo a cada 50ms para não inundar o socket)
            if (controleAtivo && ws) {
                if (!img._lastMove || Date.now() - img._lastMove > 50) {
                    ws.send(`MOUSE_MOVE ${coords.x} ${coords.y}`);
                    img._lastMove = Date.now();
                }
            }
        });

        // ============================================================
        // Eventos de Teclado (quando o controle está ativo)
        // ============================================================
        document.addEventListener('keydown', function (e) {
            if (!controleAtivo || !ws) return;

            // Previne o comportamento padrão do navegador para não interferir
            e.preventDefault();

            // Envia o Virtual Key Code do Windows
            // A propriedade e.keyCode do JavaScript corresponde ao VK_CODE do Windows
            // para teclas comuns (letras, números, F1-F12, Enter, etc)
            ws.send(`KEY_PRESS ${e.keyCode}`);
        });

        function resetUI() {
            streaming = false;
            controleAtivo = false;
            document.getElementById('status').className = 'disconnected';
            document.getElementById('status').textContent = '● Desconectado';
            document.getElementById('btnConectar').disabled = false;
            document.getElementById('btnDesconectar').disabled = true;
            document.getElementById('btnCapturar').disabled = true;
            document.getElementById('btnStream').disabled = true;
            document.getElementById('btnControle').disabled = true;
            document.getElementById('btnStream').textContent = '▶️ Iniciar Stream';
            document.getElementById('btnControle').textContent = '🖱️ Ativar Controle';
            document.getElementById('controleInfo').textContent = 'Controle: Desativado';
            document.getElementById('controleInfo').style.color = '#666';
        }
    </script>
</body>
</html>
